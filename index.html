<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a0b14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aether Realms" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Primary Meta Tags -->
    <title>Aether Realms - VR Tabletop Strategy Game</title>
    <meta name="title" content="Aether Realms - VR Tabletop Strategy Game" />
    <meta name="description" content="Experience epic VR tabletop strategy gaming. Build your realm, command armies, and battle players worldwide in immersive virtual reality." />
    <meta name="keywords" content="VR, strategy game, tabletop, virtual reality, gaming, multiplayer, realm building" />
    <meta name="author" content="Aether Realms Team" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aetherrealms.com/" />
    <meta property="og:title" content="Aether Realms - VR Tabletop Strategy Game" />
    <meta property="og:description" content="Experience epic VR tabletop strategy gaming. Build your realm, command armies, and battle players worldwide." />
    <meta property="og:image" content="/assets/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://aetherrealms.com/" />
    <meta name="twitter:title" content="Aether Realms - VR Tabletop Strategy Game" />
    <meta name="twitter:description" content="Experience epic VR tabletop strategy gaming. Build your realm, command armies, and battle players worldwide." />
    <meta name="twitter:image" content="/assets/og-image.jpg" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://aetherrealms.com/" />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS Prefetch for analytics -->
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
